networks:
  ananas:
    driver: bridge
  infra:
    external: true
    name: infra

services:
  ananas-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ananas-migrate
    networks:
      - ananas
      - infra
    env_file:
      - .env
    command: ["npx", "tsx", "lib/db/migrate.ts"]
    restart: "no"

  ananas-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ananas-chat
    networks:
      - ananas
      - infra
    ports:
      - "4269:3000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://ananas-qdrant:6333
      - REDIS_URL=redis://ananas-redis:6379
    depends_on:
      ananas-migrate:
        condition: service_completed_successfully
      ananas-qdrant:
        condition: service_started
      ananas-redis:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped

  ananas-embedder:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ananas-embedder
    networks:
      - ananas
      - infra
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://ananas-qdrant:6333
    depends_on:
      ananas-qdrant:
        condition: service_started
      ananas-redis:
        condition: service_healthy
    restart: unless-stopped

  ananas-qdrant:
    image: qdrant/qdrant:latest
    container_name: ananas-qdrant
    networks:
      - ananas
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  ananas-redis:
    image: redis:7-alpine
    container_name: ananas-redis
    networks:
      - ananas
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
