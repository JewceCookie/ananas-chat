networks:
  ananas:
    driver: bridge

services:
  ananas-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ananas-chat
    networks:
      - ananas
    ports:
      - "4269:3000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped

  ananas-chat-embedder:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ananas-chat-embedder
    networks:
      - ananas
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      ananas-chat-qdrant:
        condition: service_started
      ananas-chat-redis:
        condition: service_healthy
    restart: unless-stopped

  ananas-chat-qdrant:
    image: qdrant/qdrant:latest
    container_name: ananas-chat-qdrant
    networks:
      - ananas
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  ananas-chat-redis:
    image: redis:7-alpine
    container_name: ananas-chat-redis
    networks:
      - ananas
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
